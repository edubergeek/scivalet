version: '3.8'

services:
  db:
    image: mariadb:10.6
    container_name: scivalet-db
    restart: always
    environment:
      MYSQL_DATABASE: scivalet
      MYSQL_USER: scivalet_user
      MYSQL_PASSWORD: scivalet_pass
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "scivalet_user", "-pwrap_pass_not_needed_for_ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: scivalet-backend
    restart: always
    environment:
      - DB_URL=mariadb+mariadbconnector://scivalet_user:scivalet_pass@db:3306/scivalet
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20
    container_name: scivalet-frontend
    working_dir: /app/frontend
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

  cron-tasks:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: scivalet-cron
    restart: always
    environment:
      - DB_URL=mariadb+mariadbconnector://scivalet_user:scivalet_pass@db:3306/scivalet
    command: python backend/cron_scheduler.py
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
